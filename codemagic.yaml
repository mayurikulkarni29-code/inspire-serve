workflows:
  expo-ios-build:
    name: Expo iOS Build

    environment:
      node: 18
      vars:
        EXPO_TOKEN: $EXPO_TOKEN

    scripts:
      - npm install
      - npm install -g eas-cli@latest
      - eas --version
      - echo "Testing Expo authentication"
      - eas whoami || true
      - eas build --platform ios --non-interactive
